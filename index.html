<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Invitación Patricio" />

    <link href="https://fonts.cdnfonts.com/css/spongeboy-me-bob" rel="stylesheet">
    <title>Invitación</title>
    <style>
        body,
        html {
            height: 100%;
            width: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Spongeboy Me Bob', sans-serif;
            /* -----------------------
       ELIGE EL FONDO AQUÍ
       ----------------------- */
            background-color: #adccfa0a;
            /* gris de base */
            background-image: url('./imagen/1655359477.jpeg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            /* mantiene proporción */
        }
        
        .video-fondo {
            position: fixed;
            /* se queda en su lugar mientras haces scroll */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            /* detrás de todo */
        }
        /* Cuando la pantalla sea más ancha que alta (computadora) */
        
        @media (orientation: landscape) {
            .video-fondo {
                object-fit: contain;
                background: #008aca88;
                .container {
                    text-align: center;
                    padding: 20px;
                }
            }
        }
        /* Imagen central responsiva */
        
        .container img {
            width: 750vw;
            /* máximo 50% del ancho de la ventana */
            max-width: 300px;
            /* nunca más de 250px de ancho */
            height: auto;
            /* mantiene proporción */
            border-radius: 10px;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        /* Botón dorado degradado */
        
        .container button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: rgb(255, 102, 0);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(to right, #ffffff, #ff1493);
            transition: 0.3s;
        }
        
        .container button:hover {
            background: linear-gradient(to right, #fdfdfd, #ff1493);
        }
        /* Sección de invitación responsiva */
        
        .invitacion {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            max-width: 90vw;
            /* se adapta a móviles */
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        .invitacion.show {
            display: block;
            opacity: 1;
        }
        
        .boton-dorado {
            display: inline-block;
            padding: 12px 35px;
            font-size: 1.2em;
            font-weight: bold;
            color: #FFEB3B;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(to right, #fa6cff00, #fa6cff00);
            transition: 0.3s;
            text-align: center;
        }
        
        .boton-dorado:hover {
            background: linear-gradient(to right, #fa6cff00, #fa6cff00);
        }
    </style>
</head>

<body>
    <!--Video fondo-->
    <video autoplay muted loop class="video-fondo">
    <source src="imagen/ssstik.io_1772489495052.mp4" type="video/mp4">
  </video>

    <div class="container">
        <!-- Imagen central opcionalmente clicable -->
        <a href="invitacion.html">

            <!--   <img src="./imagen/Spongebob Squarepants Dancing Sticker by The SpongeBob Movie Search for SquarePants.gif" alt="Invitación">
        </a>

        <br>-->

            <!-- Botón dorado que lleva a otra página -->
            <a href="invitacion.html" class="boton-dorado">Ver invitación</a>

            <!-- Ya no se necesita la sección invitación ni el script -->
    </div>
</body>

</html
